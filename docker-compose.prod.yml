# Production docker-compose — uses pre-built images from GHCR
# Copy this to your Azure VM along with .env and nginx/ folder

services:
  api:
    image: ghcr.io/YOUR_GITHUB_USERNAME/new-automation-backend/api:latest
    container_name: dm-automation-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import http.client; c = http.client.HTTPConnection('localhost', 8000); c.request('GET', '/health'); r = c.getresponse(); exit(0 if r.status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - dm-network

  worker:
    image: ghcr.io/YOUR_GITHUB_USERNAME/new-automation-backend/worker:latest
    container_name: dm-automation-worker
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - dm-network

  beat:
    image: ghcr.io/YOUR_GITHUB_USERNAME/new-automation-backend/worker:latest
    container_name: dm-automation-beat
    command: >
      celery -A app.tasks.celery_app beat
      --loglevel=info
      --schedule=/tmp/celerybeat-schedule
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - dm-network

  nginx:
    image: nginx:alpine
    container_name: dm-automation-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/live/automationapi.creatrchoice.info/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/letsencrypt/live/automationapi.creatrchoice.info/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
      - ./nginx/certbot:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dm-network

networks:
  dm-network:
    driver: bridge
