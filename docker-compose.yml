services:
  # ============ FastAPI Backend (port 8001 on host) ============
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dm-automation-api
    ports:
      - "8001:8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import http.client; c = http.client.HTTPConnection('localhost', 8000); c.request('GET', '/health'); r = c.getresponse(); exit(0 if r.status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - dm-network

  # ============ Celery Worker ============
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: dm-automation-worker
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - dm-network

  # ============ Celery Beat Scheduler ============
  beat:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: dm-automation-beat
    command: >
      celery -A app.tasks.celery_app beat
      --loglevel=info
      --schedule=/tmp/celerybeat-schedule
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - dm-network

networks:
  dm-network:
    driver: bridge
